<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Robin F. De Guzman — Senior Software Engineer portfolio">
        <meta name="author" content="Robin F. De Guzman">
        <link rel="shortcut icon" href="img/favicon.ico">
        <title>Robin F. De Guzman</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { font-family: 'Inter', system-ui, sans-serif; }

    <body class="bg-light">
        <div class="container py-4 py-md-5">

            <!-- Full-width header: name + intro -->

                </div>
            </div>

            <div class="row g-4 align-items-start">

                <!-- Left: intro + personal info + strengths + skills + education -->
                <div class="col-12 col-md-4">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-3 p-lg-4" id="left-content">
                            <p class="text-muted">Loading&hellip;</p>
                        </div>
                    </div>
                </div>

                <!-- Right: experience -->
                <div class="col-12 col-md-8">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-3 p-lg-4" id="right-content">
                            <p class="text-muted">Loading&hellip;</p>
                        </div>
                    </div>
                </div>

            </div>

            <footer class="text-center text-muted small pt-4">
                Copyright &copy; 2020 &ndash; <span id="year"></span> Robin F. De Guzman
            </footer>
        </div>

        <script src="public/main.js" defer></script>
